name: build

# Keep the published base image current. Rebuilding with --pull (the buildx
# default) re-fetches ubuntu:26.04 and the latest apt packages each run, so the
# weekly schedule picks up upstream base + security updates without any version
# bumps. Also runs on pushes that change the build, and on manual dispatch.
on:
  schedule:
    # Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build.yml"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: peculiarengineer/ubuntu-dev

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # Always re-pull the base image so scheduled rebuilds pick up upstream
          # updates instead of a cached FROM layer.
          pull: true
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:26.04
            ${{ env.IMAGE }}:latest
          # GitHub Actions layer cache keeps unchanged builds fast; the pull:true
          # above still ensures the base layer is refreshed when upstream moves.
          cache-from: type=gha
          cache-to: type=gha,mode=max
